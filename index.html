<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember Collective — Coming Soon</title>
  <meta name="description" content="Ember Collective is coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sparks" aria-hidden="true">
    <span class="spark spark-1"></span>
    <span class="spark spark-2"></span>
    <span class="spark spark-3"></span>
    <span class="spark spark-4"></span>
    <span class="spark spark-5"></span>
    <span class="spark spark-6"></span>
    <span class="spark spark-7"></span>
    <span class="spark spark-8"></span>
    <span class="spark spark-9"></span>
    <span class="spark spark-10"></span>
  </div>

  <div class="ember-glow glow-one"></div>
  <div class="ember-glow glow-two"></div>
  <div class="grain"></div>

  <main class="page">
    <section class="splash">
      <div class="logo-stage">
        <img src="assets/logo/ember-logo.svg" alt="Ember Collective logo" class="logo" />
      </div>

      <div class="copy">
        <h1>Something new is catching fire.</h1>

        <div class="status-row">
          <span class="pulse-dot"></span>
          <span>Coming Soon</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>© Ember Collective</span>
      <span class="divider"></span>
      <span>Washington State</span>
    </footer>
  </main>
</body>
</html>
